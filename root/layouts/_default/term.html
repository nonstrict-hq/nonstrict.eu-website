{{ define "main" }}
<div class="relative bg-gray-50 px-6 pt-16 pb-20 lg:px-8 lg:pb-28">
    <div class="relative mx-auto max-w-7xl">
        <div class="text-center">
            <h1 class="text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl">{{ .Title }}</h1>
            <p class="mx-auto mt-3 max-w-2xl text-xl text-gray-500 sm:mt-4">
                {{ len .Pages }} {{ if eq (len .Pages) 1 }}post{{ else }}posts{{ end }} tagged with "{{ .Title }}"
            </p>
        </div>
        <div class="mx-auto mt-12 grid max-w-lg gap-5 lg:max-w-none lg:grid-cols-3">
            {{ range .Pages.ByDate.Reverse }}
            {{ partial "blog-card.html" . }}
            {{ end }}
        </div>
        <div class="text-center mt-12">
            <a href="/tags/" class="text-orange-500 hover:underline font-medium">
                &larr; All tags
            </a>
        </div>
    </div>
</div>
{{ end }}
