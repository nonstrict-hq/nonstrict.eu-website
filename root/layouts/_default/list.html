{{ define "main" }}
<div class="relative bg-gray-50 px-6 pt-16 pb-20 lg:px-8 lg:pb-28">
    <div class="relative mx-auto max-w-7xl">
        <div class="text-center">
            <h1 class="text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl">{{ .Title }}</h1>
            {{ with .Description }}
            <p class="mx-auto mt-3 max-w-2xl text-xl text-gray-500 sm:mt-4">{{ . }}</p>
            {{ end }}
        </div>
        <div class="mx-auto mt-12">
            {{ .Content }}
            {{ range .Pages }}
            <article class="mb-8">
                <h2><a href="{{ .Permalink }}" class="text-xl text-orange-500 hover:underline">{{ .Title }}</a></h2>
                <p class="text-gray-600">{{ .Description }}</p>
            </article>
            {{ end }}
        </div>
    </div>
</div>
{{ end }}
