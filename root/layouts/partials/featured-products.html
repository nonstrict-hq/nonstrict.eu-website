<div class="bg-white py-16 px-6 lg:px-8">
    <div class="mx-auto max-w-7xl">
        <div class="grid gap-8 md:grid-cols-2">
            {{ range .Site.Data.apps.featured }}
            <a href="{{ .url }}" class="group block rounded-xl bg-white p-8 shadow-sm ring-1 ring-gray-200 transition hover:-translate-y-1 hover:shadow-lg">
                <div class="flex items-start gap-6">
                    <img src="{{ .icon }}" alt="{{ .name }}" class="h-16 w-16 rounded-xl shadow-md">
                    <div>
                        <h3 class="text-xl font-bold text-gray-900 group-hover:text-orange-500">{{ .name }}</h3>
                        <p class="mt-2 text-gray-600">{{ .description }}</p>
                        <p class="mt-4 text-orange-500 font-medium group-hover:underline">Learn more &rarr;</p>
                    </div>
                </div>
            </a>
            {{ end }}
        </div>
    </div>
</div>
