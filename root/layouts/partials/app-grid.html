<div class="bg-gray-50 py-16 px-6 lg:px-8">
    <div class="mx-auto max-w-7xl">
        <h2 class="text-center text-2xl font-bold text-gray-900 mb-12">More apps we've built</h2>
        <div class="grid grid-cols-2 gap-8 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6">
            {{ range .Site.Data.apps.apps }}
            <a href="{{ .url }}" class="group flex flex-col items-center text-center transition hover:-translate-y-1">
                <img src="{{ .icon }}" alt="{{ .name }}" class="h-16 w-16 rounded-xl shadow-md mb-3">
                <span class="text-sm font-medium text-gray-700 group-hover:text-orange-500">{{ .name }}</span>
            </a>
            {{ end }}
        </div>
    </div>
</div>
