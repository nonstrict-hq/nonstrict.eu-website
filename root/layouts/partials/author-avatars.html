<div class="flex-shrink-0 flex -space-x-2">
    {{ range .Params.authors }}
    {{ $author := index $.Site.Data.authors . }}
    {{ if $author }}
    <img src="https://www.gravatar.com/avatar/{{ $author.gravatar }}?s=256"
         alt="{{ $author.name }}"
         class="h-10 w-10 rounded-full ring-2 ring-white"/>
    {{ end }}
    {{ end }}
</div>
